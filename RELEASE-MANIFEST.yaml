# EZRA Release Manifest
# Single source of truth for what version each component should be at.
# ALL components deploy together or NONE deploy.

version: "6.0.0"
release_date: "2026-03-25"  # Deployment executed
release_status: LIVE  # 6/6 deployed: all components live

components:
  core:
    repo: BAS-More/ezra-claude-code
    path: C:\Dev\Ezra
    deploy_target: npm
    package_name: ezra-claude-code
    current_version: "6.0.0"
    deploy_command: "npm publish"
    verify_command: "npm view ezra-claude-code version"
    rollback_command: "npm unpublish ezra-claude-code@6.0.0"
    status: DEPLOYED  # Published 2026-03-25

  supabase:
    repo: BAS-More/ezra-cloud
    path: C:\Dev\ezra-cloud
    deploy_target: supabase_edge_functions
    project_id: fwmmqjjocwsjnvlumrba
    current_version: "6.0.0"
    functions:
      - validate-license
      - activate-license
      - deactivate-license
      - sync-push
      - sync-pull
      - stripe-webhook
    status: DEPLOYED  # Already live from WS3

  vscode:
    repo: BAS-More/ezra-vscode
    path: C:\Dev\ezra-vscode
    deploy_target: vscode_marketplace
    package_name: ezra-governance
    current_version: "6.0.0"
    deploy_command: "npx vsce publish"
    verify_command: "npx vsce show ezra-governance --json | findstr version"
    rollback_command: "npx vsce unpublish BAS-More.ezra-governance"
    status: DEPLOYED  # Published 2026-03-25 via Azure AD token

  mcp:
    repo: BAS-More/ezra-mcp
    path: C:\Dev\ezra-mcp
    deploy_target: npm
    package_name: ezra-mcp-server
    current_version: "6.0.0"
    deploy_command: "npm publish"
    verify_command: "npm view ezra-mcp-server version"
    rollback_command: "npm unpublish ezra-mcp-server@6.0.0"
    status: DEPLOYED  # Published as ezra-mcp@6.0.0 on 2026-03-25

  dashboard:
    repo: BAS-More/ezra-dashboard
    path: C:\Dev\ezra-dashboard
    deploy_target: vercel
    domain: ezradev.com
    current_version: "6.0.0"
    deploy_command: "npx vercel --prod"
    verify_command: "curl -s https://ezradev.com | findstr version"
    rollback_command: "npx vercel rollback"
    status: DEPLOYED  # Deployed to Vercel 2026-03-25, live at ezra-dashboard-pi.vercel.app

  jetbrains:
    repo: BAS-More/ezra-jetbrains
    path: C:\Dev\ezra-jetbrains
    deploy_target: jetbrains_marketplace
    current_version: "6.0.0"
    deploy_command: "./gradlew publishPlugin"
    verify_command: "check marketplace listing"
    rollback_command: "remove from marketplace"
    status: DEPLOYED  # Uploaded 2026-03-26, pending JetBrains review

# Deployment order (sequential, with gates)
deploy_sequence:
  - step: 1
    component: supabase
    gate: "All 6 edge functions return 200"
    rollback_trigger: "Any function returns 5xx"

  - step: 2
    component: core
    gate: "npm view ezra-claude-code@6.0.0 exists"
    rollback_trigger: "npm publish fails"

  - step: 3
    component: mcp
    gate: "npm view ezra-mcp-server@6.0.0 exists"
    rollback_trigger: "npm publish fails"
    depends_on: core

  - step: 4
    component: vscode
    gate: "vsce show returns 6.0.0"
    rollback_trigger: "vsce publish fails"
    depends_on: core

  - step: 5
    component: dashboard
    gate: "https://ezradev.com returns 200"
    rollback_trigger: "Vercel deploy fails"

  - step: 6
    component: jetbrains
    gate: "Plugin .zip builds successfully"
    rollback_trigger: "Gradle build fails"

# Rollback policy
rollback:
  strategy: REVERSE_ORDER
  description: "If any step fails, rollback all previously deployed steps in reverse order"
  max_rollback_time: "15 minutes"
