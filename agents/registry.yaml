# ═══════════════════════════════════════════════════════════════════════════════
# EZRA Agent Registry — 100 Specialized Roles Across 12 Domains
# ═══════════════════════════════════════════════════════════════════════════════
#
# Each role maps to one of 4 core agent engines (ezra-architect, ezra-reviewer,
# ezra-guardian, ezra-reconciler) and adds a specialized focus brief.
#
# The /ezra:agents command reads this registry to recommend optimal agents
# for any task. scan/review commands use it for dynamic dispatch.
# ═══════════════════════════════════════════════════════════════════════════════

version: 1
updated: 2025-07-17
total_roles: 100

core_agents:
  - id: ezra-architect
    description: Architecture analysis engine — layer mapping, dependency tracing, pattern detection
    file: agents/ezra-architect.md
  - id: ezra-reviewer
    description: Security + quality review engine — OWASP checks, code quality, confidence scoring
    file: agents/ezra-reviewer.md
  - id: ezra-guardian
    description: Governance enforcement engine — decision compliance, protected paths, standards
    file: agents/ezra-guardian.md
  - id: ezra-reconciler
    description: Plan reconciliation engine — plan vs implementation, gap detection, constraints
    file: agents/ezra-reconciler.md

domains:

  # ─────────────────────────────────────────────────────────────────────────────
  # DOMAIN 1: ARCHITECTURE (10 roles)
  # ─────────────────────────────────────────────────────────────────────────────
  architecture:
    description: Architecture analysis and design review
    icon: "\U0001F3D7"
    roles:
      - id: arch-general
        name: Architecture Analyst
        base_agent: ezra-architect
        specialty: Full-stack architecture analysis — layers, patterns, coupling, cohesion
        best_for: [architecture review, codebase analysis, system design review]
        tags: [architecture, layers, patterns, dependencies, coupling]

      - id: arch-microservices
        name: Microservices Specialist
        base_agent: ezra-architect
        specialty: Microservices patterns — service boundaries, inter-service communication, data ownership
        best_for: [microservices review, service decomposition, distributed systems]
        tags: [microservices, distributed, service-mesh, saga, event-bus]

      - id: arch-monolith
        name: Modular Monolith Specialist
        base_agent: ezra-architect
        specialty: Monolith and modular monolith patterns — module boundaries, internal APIs, migration readiness
        best_for: [monolith review, modularization, monolith-to-microservices planning]
        tags: [monolith, modular, bounded-context, module-boundary]

      - id: arch-api
        name: API Design Specialist
        base_agent: ezra-architect
        specialty: API architecture — REST maturity, GraphQL schema design, gRPC service definitions, versioning
        best_for: [API design review, endpoint audit, contract review, API versioning]
        tags: [api, rest, graphql, grpc, openapi, swagger, versioning]

      - id: arch-database
        name: Database Architecture Specialist
        base_agent: ezra-architect
        specialty: Database design — schema normalization, indexing strategy, query patterns, read/write separation
        best_for: [database design review, schema audit, query optimization planning]
        tags: [database, schema, indexing, normalization, postgresql, mongodb]

      - id: arch-frontend
        name: Frontend Architecture Specialist
        base_agent: ezra-architect
        specialty: Frontend architecture — component hierarchy, state management, rendering patterns, code splitting
        best_for: [frontend architecture review, component structure audit, state management review]
        tags: [frontend, react, vue, angular, components, state-management, rendering]

      - id: arch-event-driven
        name: Event-Driven Architecture Specialist
        base_agent: ezra-architect
        specialty: Event-driven patterns — CQRS, event sourcing, message queues, pub/sub, saga orchestration
        best_for: [event-driven review, CQRS audit, message queue design, saga pattern review]
        tags: [events, cqrs, event-sourcing, message-queue, pub-sub, saga, kafka, rabbitmq]

      - id: arch-ddd
        name: Domain-Driven Design Specialist
        base_agent: ezra-architect
