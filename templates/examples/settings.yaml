  level: monitor

self_learning:
  enabled: true
  level: monitor

project_manager:
  enabled: true
  level: monitor

library:
  enabled: true
  level: monitor

agents:
  enabled: true
  level: monitor

dashboard:
  enabled: true
  level: monitor

memory:
  enabled: true
  level: monitor

planning:
  enabled: true
  level: monitor

